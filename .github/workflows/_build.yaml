name: Build (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        description: Version of the node
        required: false
        default: 24
        type: string

      artifact-name:
        description: Name to five the uploaded artifact
        required: false
        default: dist
        type: string
    outputs:
      artifact-name:
        description: Name of the artifact produced by the job
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.echo.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Vite
        uses: ./.github/actions/build-vite
        with:
          node-version: ${{ inputs.node-version }}
          artifact-name: ${{ inputs.artifact-name }}

      - name: Echo artifact name
        id: echo
        run: echo "name=${{ inputs.artifact-name }}" >> "$GITHUB_OUTPUT"
