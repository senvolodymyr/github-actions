name: Deploy Workflow

on:
  push:
    branches: # list expected
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Vite
        uses: ./.github/actions/build-vite

  deploy:
    environment: production
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} # secretS
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }} # secretS
          aws-region: eu-central-1

      - run: aws s3 sync dist/ s3://github-actions-950984809060-eu-central-1-an --delete
